name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos-check:
    name: macOS checks
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: npm

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ''
        run: |
          npm ci
          npm rebuild electron --foreground-scripts
          node -e "const fs = require('node:fs'); const electron = require('electron'); console.log(electron); if (!fs.existsSync(electron)) throw new Error('Electron executable is missing')"

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build renderer and main
        run: npm run build

      - name: E2E playback tests
        run: npm run test:e2e
