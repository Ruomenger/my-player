appId: io.github.my-player
productName: My Player
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.music
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
  extendInfo:
    - NSDocumentsFolderUsageDescription: My Player needs access to music files selected from Documents.
    - NSDownloadsFolderUsageDescription: My Player needs access to music files selected from Downloads.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: true
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
